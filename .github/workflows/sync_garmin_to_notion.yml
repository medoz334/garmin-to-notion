name: Sync Garmin to Notion

on:
  schedule:
    - cron: '0 1 */2 * *'  # 2日に1回 10:00 JST
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: garmin-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Restore Garmin tokens from secrets
        env:
          GARMIN_TOKENS_JSON: ${{ secrets.GARMIN_TOKENS_JSON }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${GARMIN_TOKENS_JSON:-}" ]; then
            echo "::error::GARMIN_TOKENS_JSON secret is empty or missing."
            exit 1
          fi

          mkdir -p ~/.garminconnect
          printf '%s' "$GARMIN_TOKENS_JSON" > ~/.garminconnect/garmin_tokens.json
          chmod 600 ~/.garminconnect/garmin_tokens.json

          echo "Garmin token file restored."
          echo "Token file size: $(wc -c < ~/.garminconnect/garmin_tokens.json) bytes"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        env:
          GARMIN_TOKEN_DIR: ~/.garminconnect
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          NOTION_PR_DB_ID: ${{ secrets.NOTION_PR_DB_ID }}
          NOTION_STEPS_DB_ID: ${{ secrets.NOTION_STEPS_DB_ID }}
          NOTION_SLEEP_DB_ID: ${{ secrets.NOTION_SLEEP_DB_ID }}
          GARMIN_SLEEP_BACKFILL_DAYS: ${{ secrets.GARMIN_SLEEP_BACKFILL_DAYS }}
          GARMIN_ACTIVITIES_FETCH_LIMIT: ${{ secrets.GARMIN_ACTIVITIES_FETCH_LIMIT }}
        run: |
          python garmin-activities.py
          python personal-records.py
          python daily-steps.py
          python sleep-data.py
