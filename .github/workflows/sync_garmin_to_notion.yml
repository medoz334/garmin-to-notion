name: Sync Garmin to Notion

on:
  schedule:
    - cron: '0 1 * * *'  # 毎日 10:00 JST（UTC 01:00）
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Restore Garmin tokens from secrets
        env:
          GARMIN_TOKENS_JSON: ${{ secrets.GARMIN_TOKENS_JSON }}
        run: |
          mkdir -p ~/.garminconnect
          printf '%s' "$GARMIN_TOKENS_JSON" > ~/.garminconnect/garmin_tokens.json
          chmod 600 ~/.garminconnect/garmin_tokens.json
          echo "==DEBUG=="
          ls -la ~/.garminconnect/garmin_tokens.json
          echo "Size: $(wc -c < ~/.garminconnect/garmin_tokens.json) bytes (expected ~2016)"
          echo "First 30 chars:"
          head -c 30 ~/.garminconnect/garmin_tokens.json
          echo ""
          echo "Last 30 chars:"
          tail -c 30 ~/.garminconnect/garmin_tokens.json
          echo ""
          echo "==END=="

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          NOTION_PR_DB_ID: ${{ secrets.NOTION_PR_DB_ID }}
          NOTION_STEPS_DB_ID: ${{ secrets.NOTION_STEPS_DB_ID }}
          NOTION_SLEEP_DB_ID: ${{ secrets.NOTION_SLEEP_DB_ID }}
          GARMIN_ACTIVITIES_FETCH_LIMIT: ${{ secrets.GARMIN_ACTIVITIES_FETCH_LIMIT }}
        run: |
          python garmin-activities.py
          python personal-records.py
          python daily-steps.py
          python sleep-data.py
